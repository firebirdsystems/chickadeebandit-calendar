<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           var(--hub-bg, #f9fafb);
      --card:         var(--hub-surface, #ffffff);
      --border:       var(--hub-border, #e5e7eb);
      --border-mid:   var(--hub-border, #d1d5db);
      --text:         var(--hub-text, #111827);
      --muted:        var(--hub-text-muted, #6b7280);
      --accent:       var(--hub-primary, #111827);
      --accent-fg:    var(--hub-primary-fg, #ffffff);
      --accent-hover: var(--hub-primary-hover, #374151);
      --accent-light: #f3f4f6;
      --today-bg: #f0fdf4; --today-ring: #16a34a; --other-month: #9ca3af;
      --radius:       var(--hub-radius, 0.5rem);
      --shadow:       0 1px 3px rgba(0,0,0,.07);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; font-size: var(--hub-font-size, 15px); line-height: 1.5;
    }
    .app { max-width: 900px; margin: 0 auto; padding: 12px 16px 40px; }

    /* ── App header ──────────────────────────────────────── */
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .nav-group { display: flex; align-items: center; gap: 8px; }
    .cal-title { font-size: 1.25rem; font-weight: 700; min-width: 160px; }
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 8px; font-size: 0.82rem;
      font-weight: 600; cursor: pointer; border: none; transition: opacity .15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--text); color: var(--text); }
    .btn-icon { background: var(--card); border: 1.5px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 7px; font-size: 0.9rem; }
    .btn-icon:hover { background: var(--border); }
    .btn-sm { padding: 4px 10px; font-size: 0.78rem; }
    .btn-danger { background: #dc2626; color: white; }

    .view-toggle {
      display: flex; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .view-toggle button {
      padding: 6px 12px; border: none; background: transparent;
      font-size: 0.82rem; font-weight: 600; cursor: pointer; color: var(--muted);
    }
    .view-toggle button.active { background: var(--accent); color: white; }

    /* ── Month grid ──────────────────────────────────────── */
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; background: var(--card);
    }
    .cal-dow {
      padding: 6px 4px; text-align: center;
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: #f9fafb;
    }
    .cal-cell {
      min-height: 90px; padding: 4px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      cursor: pointer; position: relative;
      transition: background .1s;
    }
    .cal-cell:nth-child(7n) { border-right: none; }
    .cal-cell:hover { background: #f3f4f6; }
    .cal-cell.other-month { background: #fafafa; }
    .cal-cell.today { background: var(--today-bg); }
    .cal-day-num {
      font-size: 0.78rem; font-weight: 600; color: var(--muted);
      margin-bottom: 3px; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .cal-cell.today .cal-day-num { background: var(--today-ring); color: white; }
    .cal-cell.other-month .cal-day-num { color: var(--other-month); }

    /* ── Event pills (month view) ────────────────────────── */
    .ev-pill {
      display: block; width: 100%; margin-bottom: 2px;
      padding: 1px 5px; border-radius: 4px;
      font-size: 0.68rem; font-weight: 600; color: white;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; line-height: 1.6;
    }
    .ev-pill.synced { opacity: .65; }
    .ev-pill .ev-time { opacity: .85; margin-right: 3px; }
    .ev-more { font-size: 0.65rem; color: var(--muted); font-weight: 600; padding: 1px 4px; cursor: pointer; }
    .ev-more:hover { color: var(--accent); }

    /* ── Agenda view ─────────────────────────────────────── */
    .agenda-day-heading {
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .05em; color: var(--muted);
      padding: 14px 0 6px;
      display: flex; align-items: center; gap: 8px;
    }
    .agenda-day-heading .day-num {
      font-size: 1.4rem; font-weight: 800; color: var(--text);
      text-transform: none; letter-spacing: 0; line-height: 1;
    }
    .agenda-day-heading.today-heading .day-num { color: var(--today-ring); }
    .agenda-event {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 10px 14px; background: var(--card);
      border: 1px solid var(--border); border-radius: 8px;
      margin-bottom: 6px; cursor: pointer; transition: border-color .15s;
    }
    .agenda-event:hover { border-color: var(--accent); }
    .agenda-event.synced { opacity: .75; }
    .ev-color-bar { width: 4px; border-radius: 2px; flex-shrink: 0; align-self: stretch; }
    .agenda-time { font-size: 0.78rem; color: var(--muted); min-width: 70px; flex-shrink: 0; padding-top: 2px; font-weight: 500; }
    .agenda-body { flex: 1; min-width: 0; }
    .agenda-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 2px; }
    .agenda-meta { font-size: 0.75rem; color: var(--muted); }
    .agenda-empty { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }

    /* ── Time grid (day / week views) ────────────────────── */
    .tg-wrap {
      display: flex; flex-direction: column;
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; background: var(--card);
    }
    .tg-header {
      display: flex; border-bottom: 2px solid var(--border);
      background: #f9fafb; flex-shrink: 0;
    }
    .tg-gutter {
      width: 52px; flex-shrink: 0;
      border-right: 1px solid var(--border);
    }
    .tg-day-hdr {
      flex: 1; text-align: center; padding: 6px 2px;
      cursor: pointer; border-right: 1px solid var(--border);
      transition: background .1s;
    }
    .tg-day-hdr:last-child { border-right: none; }
    .tg-day-hdr:hover { background: var(--accent-light); }
    .tg-hdr-dow { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .tg-hdr-num {
      font-size: .95rem; font-weight: 700; color: var(--text);
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 2px auto 0;
    }
    .tg-day-hdr.tg-today .tg-hdr-dow { color: var(--today-ring); }
    .tg-day-hdr.tg-today .tg-hdr-num { background: var(--today-ring); color: white; }

    .tg-allday-bar {
      display: flex; border-bottom: 1px solid var(--border);
      background: #fafafa; flex-shrink: 0; min-height: 24px;
    }
    .tg-allday-lbl {
      width: 52px; flex-shrink: 0; font-size: .6rem; color: var(--muted);
      text-align: right; padding: 5px 6px 4px;
      border-right: 1px solid var(--border);
    }
    .tg-allday-col {
      flex: 1; padding: 2px 3px;
      border-right: 1px solid var(--border);
    }
    .tg-allday-col:last-child { border-right: none; }
    .tg-allday-ev {
      font-size: .67rem; font-weight: 600; color: white;
      padding: 1px 5px; border-radius: 3px; margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer;
    }
    .tg-allday-more { font-size: .62rem; color: var(--muted); padding: 1px 3px; cursor: pointer; }

    .tg-scroll { overflow-y: auto; flex: 1; max-height: 580px; }
    .tg-body { display: flex; }
    .tg-hours { width: 52px; flex-shrink: 0; border-right: 1px solid var(--border); }
    .tg-hour-slot {
      height: 56px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start;
      font-size: .62rem; color: var(--muted);
      padding: 3px 6px 0; white-space: nowrap;
    }
    .tg-cols { display: flex; flex: 1; }
    .tg-col {
      flex: 1; position: relative;
      border-right: 1px solid var(--border);
      background: white;
    }
    .tg-col:last-child { border-right: none; }
    .tg-col.tg-today { background: #fafff8; }
    .tg-col-lines {
      position: absolute; inset: 0; pointer-events: none;
    }
    .tg-col-line {
      height: 56px; border-bottom: 1px solid var(--border);
    }
    .tg-col-line:nth-child(odd) {
      border-bottom-style: dashed; border-bottom-color: #f0f0f0;
    }

    .tg-ev {
      position: absolute; left: 2px; right: 2px;
      border-radius: 4px; padding: 3px 5px;
      cursor: pointer; overflow: hidden; z-index: 1;
      opacity: .93; transition: opacity .1s;
      min-height: 18px;
    }
    .tg-ev:hover { opacity: 1; box-shadow: 0 2px 6px rgba(0,0,0,.15); }
    .tg-ev-title { font-size: .7rem; font-weight: 700; color: white; line-height: 1.3; }
    .tg-ev-time  { font-size: .62rem; color: rgba(255,255,255,.85); }

    .tg-now-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: #ef4444; z-index: 2;
    }
    .tg-now-dot {
      position: absolute; left: -4px; top: -4px;
      width: 10px; height: 10px; border-radius: 50%;
      background: #ef4444;
    }

    /* ── Day panel ───────────────────────────────────────── */
    .day-panel-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      display: flex; align-items: flex-end; justify-content: center; z-index: 50;
    }
    @media (min-width: 600px) { .day-panel-backdrop { align-items: center; padding: 20px; } }
    .day-panel {
      background: white; border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 500px; padding: 20px;
      max-height: 75vh; overflow-y: auto;
    }
    @media (min-width: 600px) { .day-panel { border-radius: var(--radius); } }
    .day-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .day-panel-title { font-size: 1rem; font-weight: 700; }
    .day-panel-event {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px; border-radius: 8px; border: 1px solid var(--border);
      margin-bottom: 8px; cursor: pointer;
    }
    .day-panel-event:hover { border-color: var(--accent); }
    .day-panel-event .time { font-size: 0.75rem; color: var(--muted); min-width: 60px; padding-top: 1px; }
    .day-panel-event .ev-title { font-weight: 600; font-size: 0.88rem; }
    .day-panel-event .ev-loc { font-size: 0.75rem; color: var(--muted); }

    /* ── Modal ───────────────────────────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: flex-end; justify-content: center; z-index: 100;
    }
    @media (min-width: 600px) { .modal-backdrop { align-items: center; padding: 20px; } }
    .modal {
      background: white; border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 540px; padding: 22px;
      max-height: 94vh; overflow-y: auto;
    }
    @media (min-width: 600px) { .modal { border-radius: var(--radius); } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .modal-header h3 { font-size: 1.05rem; font-weight: 700; }

    .form-row { margin-bottom: 13px; }
    .form-label {
      display: block; font-size: 0.72rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px;
    }
    .form-input, .form-select, .form-textarea {
      width: 100%; border: 1.5px solid var(--border); border-radius: 7px;
      padding: 8px 11px; font-size: 0.9rem; outline: none; font-family: inherit;
      transition: border-color .15s; background: white;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent); }
    .form-textarea { resize: vertical; min-height: 60px; }
    .form-inline { display: flex; gap: 8px; align-items: flex-start; }
    .form-inline > * { flex: 1; }
    .muted-label { font-weight: 400; text-transform: none; }

    .color-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
    .color-swatch {
      width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
      border: 2.5px solid transparent; transition: all .12s;
    }
    .color-swatch.selected { border-color: #111827; transform: scale(1.15); }

    .attendee-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .attendee-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      border: 1.5px solid var(--border); cursor: pointer;
      font-size: 0.8rem; font-weight: 500; color: var(--muted);
      background: transparent; transition: all .12s;
    }
    .attendee-btn.selected { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
    .attendee-av { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.55rem; font-weight: 700; color: white; }

    .rec-section { border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
    .days-grid { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .day-toggle {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1.5px solid var(--border); cursor: pointer;
      font-size: 0.72rem; font-weight: 700; color: var(--muted); background: transparent;
    }
    .day-toggle.selected { border-color: var(--accent); background: var(--accent); color: white; }

    .scope-option {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; cursor: pointer; margin-bottom: 8px; transition: all .12s;
    }
    .scope-option:hover { border-color: var(--accent); background: var(--accent-light); }
    .scope-option .scope-icon { font-size: 1.1rem; }
    .scope-option .scope-label { font-weight: 600; font-size: 0.88rem; }
    .scope-option .scope-desc { font-size: 0.75rem; color: var(--muted); }

    .ev-detail-color { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .ev-detail-row { display: flex; gap: 10px; margin-bottom: 8px; font-size: 0.88rem; }
    .ev-detail-icon { width: 18px; text-align: center; color: var(--muted); flex-shrink: 0; padding-top: 1px; }
    .ev-detail-val { flex: 1; }
    .recurrence-badge { display: inline-block; font-size: 0.72rem; background: var(--accent-light); color: var(--accent); padding: 2px 8px; border-radius: 20px; font-weight: 600; }

    .toggle-row { display: flex; align-items: center; justify-content: space-between; }
    .toggle-switch { position: relative; width: 40px; height: 22px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: .2s; }
    .toggle-slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .2s; }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent); }
    .toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }

    .modal-actions { display: flex; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
    .modal-actions .btn { flex: 1; justify-content: center; min-width: 90px; }

    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  </style>
  <base href="/run/calendar/" />
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="nav-group">
      <button class="btn-icon" onclick="prevPeriod()">‹</button>
      <span class="cal-title" id="cal-title">…</span>
      <button class="btn-icon" onclick="nextPeriod()">›</button>
      <button class="btn btn-ghost btn-sm" onclick="goToday()">Today</button>
    </div>
    <div class="nav-group">
      <div class="view-toggle">
        <button id="vbtn-day"    onclick="setView('day')">Day</button>
        <button id="vbtn-week"   onclick="setView('week')">Week</button>
        <button id="vbtn-month"  onclick="setView('month')">Month</button>
        <button id="vbtn-agenda" onclick="setView('agenda')">Agenda</button>
      </div>
      <button class="btn btn-primary" onclick="openCreateModal()">+ Event</button>
    </div>
  </div>
  <div id="root"><div class="loading">Loading…</div></div>
</div>

<script type="module">
import { memberColor, initial, esc, isAdult } from "/hub-sdk.js";

const CONTEXT = window.__CONTEXT_URL ?? "";
const DB      = window.__DB_URL      ?? "";
const ME      = window.__CURRENT_MEMBER ?? null;

// ─── State ────────────────────────────────────────────────────────────────
let members      = [];
let localEvents  = [];
let syncedEvents = [];
let viewMode     = "week";
let pivot        = new Date();
let modalEl      = null;
let panelEl      = null;

// ─── Date utilities ───────────────────────────────────────────────────────
const toDateStr  = d => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const p2         = n => String(n).padStart(2,"0");
const parseLD    = s => { const [y,m,d] = s.split("-").map(Number); return new Date(y,m-1,d); };
const addDaysObj = (d,n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };
const addDayStr  = (s,n) => toDateStr(addDaysObj(parseLD(s),n));
const todayStr   = () => toDateStr(new Date());
const daysBetween= (a,b) => Math.round((parseLD(b)-parseLD(a))/86400000);

const MONTHS      = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MONTHS_SHORT= ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS_SHORT  = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DAYS_ABBR   = ["Su","Mo","Tu","We","Th","Fr","Sa"];
const DAY_NAMES   = ["sun","mon","tue","wed","thu","fri","sat"];
const EVENT_COLORS= ["#0f766e","#4f46e5","#0891b2","#16a34a","#d97706","#dc2626","#7c3aed","#db2777"];

const HOUR_H = 56; // px per hour in time grid

function fmtTime(t) {
  if (!t) return "";
  const [h,m] = t.split(":").map(Number);
  const ampm = h < 12 ? "AM" : "PM";
  const hr = h % 12 || 12;
  return m === 0 ? `${hr} ${ampm}` : `${hr}:${p2(m)} ${ampm}`;
}
function fmtDate(s, { weekday = false } = {}) {
  const d = parseLD(s);
  const opts = { month: "short", day: "numeric", year: "numeric" };
  if (weekday) opts.weekday = "long";
  return d.toLocaleDateString("en-US", opts);
}
function fmtDateShort(s) {
  return parseLD(s).toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function timeToMins(t) {
  if (!t) return null;
  const [h,m] = t.split(":").map(Number);
  return h * 60 + m;
}
function getWeekStart(d) {
  const r = new Date(d);
  r.setDate(r.getDate() - ((r.getDay() + 6) % 7)); // Monday
  return r;
}
function describeRecurrence(rule) {
  if (!rule) return "";
  const { freq, interval = 1, days } = rule;
  const n = interval === 1 ? "" : `${interval} `;
  if (freq === "daily")   return interval === 1 ? "Daily" : `Every ${interval} days`;
  if (freq === "weekly") {
    const dayStr = days?.length ? days.map(d => d[0].toUpperCase() + d[1]).join(", ") : "";
    return interval === 1 ? `Weekly${dayStr ? " on " + dayStr : ""}` : `Every ${n}weeks${dayStr ? " on " + dayStr : ""}`;
  }
  if (freq === "monthly") return interval === 1 ? "Monthly" : `Every ${n}months`;
  if (freq === "yearly")  return interval === 1 ? "Yearly"  : `Every ${n}years`;
  return "";
}

// ─── DB ───────────────────────────────────────────────────────────────────
async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ sql, params }) });
  return res.json();
}
async function initDb() {
  await db(`CREATE TABLE IF NOT EXISTS events (
    id TEXT PRIMARY KEY, title TEXT NOT NULL, description TEXT NOT NULL DEFAULT '',
    location TEXT NOT NULL DEFAULT '', start_date TEXT NOT NULL, start_time TEXT,
    end_date TEXT NOT NULL, end_time TEXT, all_day INTEGER NOT NULL DEFAULT 0,
    color TEXT NOT NULL DEFAULT '#0f766e', organizer_id TEXT,
    attendee_ids TEXT NOT NULL DEFAULT '[]', recurrence TEXT,
    recurring_event_id TEXT, original_date TEXT, is_cancelled INTEGER NOT NULL DEFAULT 0,
    source TEXT NOT NULL DEFAULT 'local', created_by TEXT,
    created_at TEXT NOT NULL, updated_at TEXT NOT NULL
  )`);
}
async function loadLocalEvents() {
  const { rows } = await db(`SELECT * FROM events WHERE source = 'local' ORDER BY start_date, start_time`);
  localEvents = rows ?? [];
}
async function loadSyncedEvents() {
  if (!CONTEXT) return;
  try {
    const res  = await fetch(`${CONTEXT}?keys=family.calendar`);
    const data = await res.json();
    const raw  = data["family.calendar"] ?? [];
    syncedEvents = raw.map(ev => ({
      id: ev.id ?? crypto.randomUUID(), title: ev.title ?? ev.summary ?? "Event",
      description: ev.description ?? "", location: ev.location ?? "",
      start_date: normalizeDate(ev.start_at ?? ev.start_date ?? ev.date),
      start_time: normalizeTime(ev.start_at),
      end_date: normalizeDate(ev.end_at ?? ev.end_date ?? ev.date),
      end_time: normalizeTime(ev.end_at), all_day: ev.all_day ? 1 : 0,
      color: "#6b7280", organizer_id: ev.family_member_id ?? null,
      attendee_ids: "[]", source: "synced",
    }));
  } catch { syncedEvents = []; }
}
function normalizeDate(iso) {
  if (!iso) return todayStr();
  return iso.includes("T") ? iso.split("T")[0] : iso.slice(0,10);
}
function normalizeTime(iso) {
  if (!iso || !iso.includes("T")) return null;
  const t = iso.split("T")[1];
  if (!t) return null;
  const [h,m] = t.split(":");
  return `${h}:${m}`;
}

// ─── Recurrence expansion ─────────────────────────────────────────────────
function eventsForRange(rangeStart, rangeEnd) {
  const results = [];
  const exMap = {};
  for (const ev of localEvents) {
    if (ev.recurring_event_id) {
      if (!exMap[ev.recurring_event_id]) exMap[ev.recurring_event_id] = {};
      exMap[ev.recurring_event_id][ev.original_date] = ev;
    }
  }
  for (const ev of localEvents) {
    if (ev.recurring_event_id) continue;
    if (!ev.recurrence) {
      if (ev.start_date <= rangeEnd && ev.end_date >= rangeStart)
        results.push({ ...ev, _date: ev.start_date });
    } else {
      const rule = JSON.parse(ev.recurrence);
      const occs = occurrencesInRange(ev.start_date, rule, rangeStart, rangeEnd);
      const durDays = daysBetween(ev.start_date, ev.end_date);
      for (const occ of occs) {
        const ex = exMap[ev.id]?.[occ];
        if (ex?.is_cancelled) continue;
        if (ex) results.push({ ...ex, _date: ex.start_date, _primaryId: ev.id, _occDate: occ });
        else results.push({ ...ev, start_date: occ, end_date: addDayStr(occ, durDays), _date: occ, _virtual: true, _primaryId: ev.id, _occDate: occ });
      }
    }
  }
  for (const ev of syncedEvents) {
    if (ev.start_date <= rangeEnd && ev.end_date >= rangeStart)
      results.push({ ...ev, _date: ev.start_date });
  }
  return results.sort((a, b) => {
    const dc = a._date.localeCompare(b._date);
    if (dc !== 0) return dc;
    if (a.all_day !== b.all_day) return a.all_day ? -1 : 1;
    if (a.start_time && b.start_time) return a.start_time.localeCompare(b.start_time);
    return 0;
  });
}
function occurrencesInRange(startDate, rule, rangeStart, rangeEnd) {
  const results = [];
  const rs = parseLD(rangeStart), re = parseLD(rangeEnd);
  const ruleEnd = rule.end_date ? parseLD(rule.end_date) : null;
  let count = 0, maxCount = rule.count ?? 10000;
  let cursor = parseLD(startDate);
  if (cursor < rs) {
    const { freq, interval: iv = 1 } = rule;
    if (freq === "daily") { const skip = Math.max(0, Math.floor((rs - cursor) / 86400000 / iv) - 1); cursor = addDaysObj(cursor, skip * iv); }
    else if (freq === "weekly" && (!rule.days || rule.days.length <= 1)) { const skip = Math.max(0, Math.floor((rs - cursor) / (86400000 * 7 * iv)) - 1); cursor = addDaysObj(cursor, skip * 7 * iv); }
    else if (freq === "monthly") { const mo = (rs.getFullYear() - cursor.getFullYear()) * 12 + rs.getMonth() - cursor.getMonth(); cursor.setMonth(cursor.getMonth() + Math.max(0, Math.floor(mo / iv) - 1) * iv); }
    else if (freq === "yearly") { const yr = rs.getFullYear() - cursor.getFullYear(); cursor.setFullYear(cursor.getFullYear() + Math.max(0, Math.floor(yr / iv) - 1) * iv); }
  }
  let iter = 0;
  while (cursor <= re && count < maxCount && iter++ < 3000) {
    if (ruleEnd && cursor > ruleEnd) break;
    if (cursor >= rs) { results.push(toDateStr(cursor)); count++; }
    cursor = advanceCursor(cursor, rule);
  }
  return results;
}
function advanceCursor(d, rule) {
  const next = new Date(d);
  const { freq, interval: iv = 1, days } = rule;
  if (freq === "daily") { next.setDate(next.getDate() + iv); }
  else if (freq === "weekly") {
    if (days?.length > 1) {
      const sel = days.map(x => DAY_NAMES.indexOf(x)).filter(x => x >= 0).sort((a,b) => a-b);
      const cur = next.getDay();
      const nxt = sel.find(x => x > cur);
      if (nxt != null) next.setDate(next.getDate() + (nxt - cur));
      else next.setDate(next.getDate() + (7 * iv - cur + sel[0]));
    } else { next.setDate(next.getDate() + 7 * iv); }
  } else if (freq === "monthly") { next.setMonth(next.getMonth() + iv); }
  else if (freq === "yearly")  { next.setFullYear(next.getFullYear() + iv); }
  return next;
}

// ─── Render main ──────────────────────────────────────────────────────────
function updateTitle() {
  const el = document.getElementById("cal-title");
  if (!el) return;
  if (viewMode === "month") {
    el.textContent = `${MONTHS[pivot.getMonth()]} ${pivot.getFullYear()}`;
  } else if (viewMode === "week") {
    const ws = getWeekStart(pivot);
    const we = addDaysObj(ws, 6);
    if (ws.getMonth() === we.getMonth())
      el.textContent = `${MONTHS_SHORT[ws.getMonth()]} ${ws.getDate()} – ${we.getDate()}, ${ws.getFullYear()}`;
    else
      el.textContent = `${MONTHS_SHORT[ws.getMonth()]} ${ws.getDate()} – ${MONTHS_SHORT[we.getMonth()]} ${we.getDate()}`;
  } else if (viewMode === "day") {
    el.textContent = pivot.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  } else {
    el.textContent = "Upcoming";
  }
  document.querySelectorAll(".view-toggle button").forEach(b => b.classList.remove("active"));
  const btn = document.getElementById(`vbtn-${viewMode}`);
  if (btn) btn.classList.add("active");
}

function render() {
  updateTitle();
  if (viewMode === "month")  renderMonth();
  else if (viewMode === "week") renderWeek();
  else if (viewMode === "day")  renderDay();
  else renderAgenda();
}

// ─── Month view ───────────────────────────────────────────────────────────
function renderMonth() {
  const year = pivot.getFullYear(), month = pivot.getMonth();
  const firstDay = new Date(year, month, 1);
  const gridStart = addDaysObj(firstDay, -firstDay.getDay());
  const gridEnd   = addDaysObj(gridStart, 41);
  const rangeStart = toDateStr(gridStart), rangeEnd = toDateStr(gridEnd);
  const evs = eventsForRange(rangeStart, rangeEnd);
  const byDate = {};
  for (const ev of evs) { if (!byDate[ev._date]) byDate[ev._date] = []; byDate[ev._date].push(ev); }
  const dowHtml = DAYS_SHORT.map(d => `<div class="cal-dow">${d}</div>`).join("");
  let cellsHtml = "", cur = new Date(gridStart);
  const today = todayStr();
  while (cur <= gridEnd) {
    const ds = toDateStr(cur), isT = ds === today, inM = cur.getMonth() === month;
    const dayEvs = byDate[ds] ?? [], show = dayEvs.slice(0,3), more = dayEvs.length - show.length;
    const pillsHtml = show.map(ev => {
      const timeStr = ev.all_day ? "" : `<span class="ev-time">${fmtTime(ev.start_time)}</span>`;
      return `<span class="ev-pill${ev.source==="synced"?" synced":""}" style="background:${ev.color}"
        onclick="event.stopPropagation();showEvent('${ev.id}','${ds}','${ev._primaryId??ev.id}','${ev._occDate??ds}')"
        title="${esc(ev.title)}">${timeStr}${esc(ev.title)}</span>`;
    }).join("");
    const moreHtml = more > 0 ? `<div class="ev-more" onclick="event.stopPropagation();openDayPanel('${ds}')">+${more} more</div>` : "";
    cellsHtml += `<div class="cal-cell${isT?" today":""}${!inM?" other-month":""}" onclick="openDayPanel('${ds}')">
      <div class="cal-day-num">${cur.getDate()}</div>${pillsHtml}${moreHtml}</div>`;
    cur.setDate(cur.getDate() + 1);
  }
  document.getElementById("root").innerHTML = `<div class="cal-grid">${dowHtml}${cellsHtml}</div>`;
}

// ─── Time grid (shared by Day and Week) ───────────────────────────────────
function renderTimeGrid(dates) {
  const rangeStart = dates[0], rangeEnd = dates[dates.length - 1];
  const evs = eventsForRange(rangeStart, rangeEnd);
  const today = todayStr();

  // Separate all-day vs timed
  const allDayByDate = {}, timedByDate = {};
  for (const ev of evs) {
    const bucket = (ev.all_day || !ev.start_time) ? allDayByDate : timedByDate;
    if (!bucket[ev._date]) bucket[ev._date] = [];
    bucket[ev._date].push(ev);
  }

  // Header row
  const headerHtml = dates.map(ds => {
    const d = parseLD(ds), isT = ds === today;
    return `<div class="tg-day-hdr${isT?" tg-today":""}" onclick="switchToDay('${ds}')">
      <div class="tg-hdr-dow">${DAYS_SHORT[d.getDay()]}</div>
      <div class="tg-hdr-num">${d.getDate()}</div>
    </div>`;
  }).join("");

  // All-day row
  const allDayHtml = dates.map(ds => {
    const dayEvs = allDayByDate[ds] ?? [];
    const rows = dayEvs.slice(0,2).map(ev =>
      `<div class="tg-allday-ev" style="background:${ev.color}"
        onclick="showEvent('${ev.id}','${ds}','${ev._primaryId??ev.id}','${ev._occDate??ds}')"
        title="${esc(ev.title)}">${esc(ev.title)}</div>`
    ).join("");
    const more = dayEvs.length > 2 ? `<div class="tg-allday-more">+${dayEvs.length-2} more</div>` : "";
    return `<div class="tg-allday-col">${rows}${more}</div>`;
  }).join("");

  // Hour labels column
  const hoursHtml = Array.from({length:24}, (_,h) =>
    `<div class="tg-hour-slot">${h === 0 ? "" : fmtTime(`${p2(h)}:00`)}</div>`
  ).join("");

  // Day columns
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();
  const nowTop  = (nowMins / 60) * HOUR_H;

  const colsHtml = dates.map(ds => {
    const isT = ds === today;
    const dayEvs = timedByDate[ds] ?? [];

    // Simple overlap detection: group into columns
    const cols = [];
    const sorted = [...dayEvs].sort((a,b) => (timeToMins(a.start_time)??0) - (timeToMins(b.start_time)??0));
    for (const ev of sorted) {
      const startM = timeToMins(ev.start_time) ?? 0;
      const endM   = timeToMins(ev.end_time) ?? (startM + 60);
      let placed = false;
      for (const col of cols) {
        const last = col[col.length - 1];
        const lastEnd = timeToMins(last.end_time) ?? ((timeToMins(last.start_time) ?? 0) + 60);
        if (startM >= lastEnd) { col.push(ev); placed = true; break; }
      }
      if (!placed) cols.push([ev]);
    }
    const nCols = cols.length || 1;

    const evHtml = cols.flatMap((col, ci) => col.map(ev => {
      const startM = timeToMins(ev.start_time) ?? 0;
      const endM   = timeToMins(ev.end_time) ?? (startM + 60);
      const top    = (startM / 60) * HOUR_H;
      const height = Math.max(((endM - startM) / 60) * HOUR_H - 2, 18);
      const w = `${90 / nCols}%`;
      const l = `${(ci * 90 / nCols) + 2}%`;
      const showTime = height > 30;
      return `<div class="tg-ev" style="top:${top}px;height:${height}px;background:${ev.color};width:${w};left:${l}"
        onclick="showEvent('${ev.id}','${ds}','${ev._primaryId??ev.id}','${ev._occDate??ds}')"
        title="${esc(ev.title)}">
        <div class="tg-ev-title">${esc(ev.title)}</div>
        ${showTime ? `<div class="tg-ev-time">${fmtTime(ev.start_time)}</div>` : ""}
      </div>`;
    })).join("");

    const gridLines = Array.from({length:24}, () => `<div class="tg-col-line"></div>`).join("");
    const nowLine = isT ? `<div class="tg-now-line" style="top:${nowTop}px"><div class="tg-now-dot"></div></div>` : "";

    return `<div class="tg-col${isT?" tg-today":""}" style="height:${24*HOUR_H}px">
      <div class="tg-col-lines">${gridLines}</div>
      ${nowLine}${evHtml}
    </div>`;
  }).join("");

  document.getElementById("root").innerHTML = `
    <div class="tg-wrap">
      <div class="tg-header">
        <div class="tg-gutter"></div>
        ${headerHtml}
      </div>
      <div class="tg-allday-bar">
        <div class="tg-allday-lbl">all day</div>
        ${allDayHtml}
      </div>
      <div class="tg-scroll" id="tg-scroll">
        <div class="tg-body">
          <div class="tg-hours">${hoursHtml}</div>
          <div class="tg-cols">${colsHtml}</div>
        </div>
      </div>
    </div>`;

  // Scroll to 7am (or current time if today is visible)
  const scrollEl = document.getElementById("tg-scroll");
  if (scrollEl) {
    const scrollTo = dates.includes(today) ? Math.max(nowTop - 80, 0) : 7 * HOUR_H;
    scrollEl.scrollTop = scrollTo;
  }
}

function renderDay() { renderTimeGrid([toDateStr(pivot)]); }
function renderWeek() {
  const ws = getWeekStart(pivot);
  renderTimeGrid(Array.from({length:7}, (_,i) => toDateStr(addDaysObj(ws, i))));
}

function switchToDay(ds) {
  pivot = parseLD(ds);
  viewMode = "day";
  render();
}
window.switchToDay = switchToDay;

// ─── Agenda view ──────────────────────────────────────────────────────────
function renderAgenda() {
  const start = toDateStr(pivot), end = addDayStr(start, 60);
  const evs = eventsForRange(start, end);
  if (!evs.length) { document.getElementById("root").innerHTML = `<div class="agenda-empty">No events in the next 60 days.</div>`; return; }
  const today = todayStr();
  let lastDate = null, html = "";
  for (const ev of evs) {
    if (ev._date !== lastDate) {
      const d = parseLD(ev._date), isT = ev._date === today;
      const label = isT ? "Today" : ev._date === addDayStr(today,1) ? "Tomorrow"
        : d.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });
      html += `<div class="agenda-day-heading${isT?" today-heading":""}"><span class="day-num">${d.getDate()}</span>${label}</div>`;
      lastDate = ev._date;
    }
    const timeStr = ev.all_day ? "All day" : [fmtTime(ev.start_time), fmtTime(ev.end_time)].filter(Boolean).join(" – ");
    const meta = [ev.location, ev.description].filter(Boolean).map(s => s.slice(0,80)).join(" · ");
    html += `<div class="agenda-event${ev.source==="synced"?" synced":""}"
      onclick="showEvent('${ev.id}','${ev._date}','${ev._primaryId??ev.id}','${ev._occDate??ev._date}')">
      <div class="ev-color-bar" style="background:${ev.color}"></div>
      <div class="agenda-time">${timeStr}</div>
      <div class="agenda-body">
        <div class="agenda-title">${esc(ev.title)}</div>
        ${meta ? `<div class="agenda-meta">${esc(meta)}</div>` : ""}
      </div>
    </div>`;
  }
  document.getElementById("root").innerHTML = `<div class="agenda">${html}</div>`;
}

// ─── Day panel ────────────────────────────────────────────────────────────
function openDayPanel(dateStr) {
  closePanels();
  const evs = eventsForRange(dateStr, dateStr);
  const dLabel = parseLD(dateStr).toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric", year:"numeric" });
  const isToday = dateStr === todayStr();
  const evRows = evs.map(ev => {
    const timeStr = ev.all_day ? "All day" : fmtTime(ev.start_time) + (ev.end_time ? " – " + fmtTime(ev.end_time) : "");
    return `<div class="day-panel-event" onclick="showEvent('${ev.id}','${dateStr}','${ev._primaryId??ev.id}','${ev._occDate??dateStr}')">
      <div style="width:4px;background:${ev.color};border-radius:2px;flex-shrink:0;align-self:stretch"></div>

}
function closePanels() { panelEl?.remove(); panelEl = null; }

// ─── Event detail ─────────────────────────────────────────────────────────

      </div></div>
    <div class="form-row"><label class="form-label">Location</label>
      <input id="ef-loc" class="form-input" type="text" value="${esc(ev.location ?? "")}" placeholder="Add location" /></div>
    <div class="form-row"><label class="form-label">Color</label><div class="color-swatches">${colorsHtml}</div></div>
    ${members.length > 0 ? `<div class="form-row"><label class="form-label">Attendees</label><div class="attendee-grid">${attsHtml}</div></div>` : ""}
    <div class="form-row"><label class="form-label">Description</label>
      <textarea id="ef-desc" class="form-textarea">${esc(ev.description ?? "")}</textarea></div>
    <div class="rec-section">
      <div class="form-row"><label class="form-label">Repeats</label>
        <select id="ef-freq" class="form-select" onchange="toggleRecFields(this.value)">${recOpts}</select></div>
      <div id="rec-days-row" style="${freq === "weekly" || (rule?.days?.length > 1) ? "" : "display:none"}">
        <div class="form-row"><label class="form-label">On days</label><div class="days-grid">${dayToggles}</div></div></div>
      <div id="rec-ends-row" style="${freq === "none" ? "display:none" : ""}">
        <div class="form-row"><label class="form-label">Ends</label>
          <select id="ef-end-type" class="form-select" onchange="toggleEndFields(this.value)">
            <option value="never" ${endType==="never"?"selected":""}>Never</option>
            <option value="count" ${endType==="count"?"selected":""}>After N occurrences</option>
            <option value="date"  ${endType==="date" ?"selected":""}>On date</option>
          </select></div>
        <div id="rec-count-row" style="${endType==="count" ? "" : "display:none"}">
          <div class="form-row"><label class="form-label">Occurrences</label>
            <input id="ef-count" class="form-input" type="number" min="2" max="999" value="${rule?.count ?? 10}" style="max-width:120px" /></div></div>
        <div id="rec-date-row" style="${endType==="date" ? "" : "display:none"}">
          <div class="form-row"><label class="form-label">End date</label>
            <input id="ef-end-date-rec" class="form-input" type="date" value="${rule?.end_date ?? addDayStr(todayStr(), 365)}" /></div></div>
      </div>
    </div>`;
}

window.toggleAllDay = function(cb) { document.querySelectorAll("#ef-start-time, #ef-end-time").forEach(el => el.style.display = cb.checked ? "none" : ""); };
window.selectColor  = function(btn, color) { document.getElementById("ef-color").value = color; document.querySelectorAll(".color-swatch").forEach(b => b.classList.remove("selected")); btn.classList.add("selected"); };
window.toggleAttendee = function(btn) { btn.classList.toggle("selected"); };
window.toggleRecFields = function(freq) {
  document.getElementById("rec-days-row").style.display  = freq === "weekly" ? "" : "none";
  document.getElementById("rec-ends-row").style.display = freq === "none" ? "none" : "";
};
window.toggleEndFields = function(type) {
  document.getElementById("rec-count-row").style.display = type === "count" ? "" : "none";
  document.getElementById("rec-date-row").style.display  = type === "date"  ? "" : "none";
};
function collectFormData() {
  const allDay = document.getElementById("ef-allday").checked;
  const freq   = document.getElementById("ef-freq").value;
  const endType = document.getElementById("ef-end-type")?.value ?? "never";
  const selDays = [...document.querySelectorAll(".day-toggle.selected")].map(b => b.dataset.day);
  const attendees = [...document.querySelectorAll(".attendee-btn.selected")].map(b => b.dataset.mid);
  let recurrence = null;
  if (freq !== "none") {
    const rule = { freq: freq === "biweekly" ? "weekly" : freq === "weekdays" ? "weekly" : freq, interval: freq === "biweekly" ? 2 : 1, end_type: endType };
    if (freq === "weekly" && selDays.length > 0) rule.days = selDays;
    if (freq === "weekdays") rule.days = ["mon","tue","wed","thu","fri"];
    if (endType === "count") rule.count = parseInt(document.getElementById("ef-count").value) || 10;
    if (endType === "date")  rule.end_date = document.getElementById("ef-end-date-rec").value;
    recurrence = JSON.stringify(rule);
  }
  return {
    title: document.getElementById("ef-title").value.trim(),
    description: document.getElementById("ef-desc").value.trim(),
    location: document.getElementById("ef-loc").value.trim(),
    start_date: document.getElementById("ef-start-date").value,
    start_time: allDay ? null : (document.getElementById("ef-start-time").value || null),
    end_date: document.getElementById("ef-end-date").value,
    end_time: allDay ? null : (document.getElementById("ef-end-time").value || null),
    all_day: allDay ? 1 : 0,
    color: document.getElementById("ef-color").value,
    attendee_ids: JSON.stringify(attendees),
    recurrence,
  };
}
function openCreateModal(defaultDate = null) {
  openModal(`<div class="modal-header"><h3>New Event</h3><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    ${buildEventForm({}, { defaultDate })}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitCreate()">Create Event</button>
    </div>`);
}
window.submitCreate = async function() {
  const data = collectFormData();
  if (!data.title) { document.getElementById("ef-title").focus(); return; }
  const id = crypto.randomUUID(), now = new Date().toISOString();
  await db(`INSERT INTO events (id,title,description,location,start_date,start_time,end_date,end_time,all_day,color,organizer_id,attendee_ids,recurrence,source,created_by,created_at,updated_at)
    VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,'local',?,?,?)`,
    [id, data.title, data.description, data.location, data.start_date, data.start_time, data.end_date, data.end_time,
     data.all_day, data.color, ME?.id ?? null, data.attendee_ids, data.recurrence, ME?.id ?? null, now, now]);
  await loadLocalEvents(); closeModal(); render();
};

// ─── Edit ─────────────────────────────────────────────────────────────────
function openEditModal(primaryId, occDate) {
  const primary = localEvents.find(e => e.id === primaryId);
  if (!primary) return;
  if (primary.recurrence) openScopeModal("edit", primaryId, occDate);
  else openDirectEdit(primary, "all", occDate);
}
function openDirectEdit(ev, scope, occDate) {
  const primary = localEvents.find(e => e.id === (ev._primaryId ?? ev.id)) ?? ev;
  const editTarget = (scope === "this" && ev.recurring_event_id) ? ev : (scope !== "all" ? { ...primary, start_date: occDate, end_date: occDate } : primary);
  openModal(`<div class="modal-header"><h3>Edit Event</h3><button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button></div>
    ${buildEventForm(editTarget)}
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="submitEdit('${primary.id}','${scope}','${occDate}')">Save</button>
    </div>`);
}
window.submitEdit = async function(primaryId, scope, occDate) {
  const data = collectFormData();
  if (!data.title) { document.getElementById("ef-title").focus(); return; }
  const now = new Date().toISOString();
  const primary = localEvents.find(e => e.id === primaryId);
  if (!primary) return;
  if (scope === "all" || !primary.recurrence) {
    await db(`UPDATE events SET title=?,description=?,location=?,start_date=?,start_time=?,end_date=?,end_time=?,all_day=?,color=?,attendee_ids=?,recurrence=?,updated_at=? WHERE id=?`,
      [data.title,data.description,data.location,data.start_date,data.start_time,data.end_date,data.end_time,data.all_day,data.color,data.attendee_ids,data.recurrence,now,primaryId]);
  } else if (scope === "this") {
    const existing = localEvents.find(e => e.recurring_event_id === primaryId && e.original_date === occDate);
    const durDays = daysBetween(primary.start_date, primary.end_date);
    const endDate = data.end_date !== occDate ? data.end_date : addDayStr(data.start_date, durDays);
    if (existing) {
      await db(`UPDATE events SET title=?,description=?,location=?,start_date=?,start_time=?,end_date=?,end_time=?,all_day=?,color=?,attendee_ids=?,updated_at=? WHERE id=?`,
        [data.title,data.description,data.location,data.start_date,data.start_time,endDate,data.end_time,data.all_day,data.color,data.attendee_ids,now,existing.id]);
    } else {
      const exId = crypto.randomUUID();
      await db(`INSERT INTO events (id,title,description,location,start_date,start_time,end_date,end_time,all_day,color,organizer_id,attendee_ids,recurring_event_id,original_date,source,created_by,created_at,updated_at)
        VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,'local',?,?,?)`,
        [exId,data.title,data.description,data.location,data.start_date,data.start_time,endDate,data.end_time,data.all_day,data.color,ME?.id??null,data.attendee_ids,primaryId,occDate,ME?.id??null,now,now]);
    }
  } else if (scope === "following") {
    const rule = JSON.parse(primary.recurrence ?? "{}");
    rule.end_date = addDayStr(occDate, -1);
    await db(`UPDATE events SET recurrence=?,updated_at=? WHERE id=?`, [JSON.stringify(rule),now,primaryId]);
    const newId = crypto.randomUUID();
    await db(`INSERT INTO events (id,title,description,location,start_date,start_time,end_date,end_time,all_day,color,organizer_id,attendee_ids,recurrence,source,created_by,created_at,updated_at)
      VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,'local',?,?,?)`,
      [newId,data.title,data.description,data.location,occDate,data.start_time,occDate,data.end_time,data.all_day,data.color,ME?.id??null,data.attendee_ids,data.recurrence,ME?.id??null,now,now]);
  }
  await loadLocalEvents(); closeModal(); render();
};

// ─── Delete ───────────────────────────────────────────────────────────────
function confirmDelete(primaryId, occDate, isRecurring) {
  if (isRecurring) openScopeModal("delete", primaryId, occDate);
  else if (confirm("Delete this event?")) deleteEvent(primaryId, occDate, "all");
}
async function deleteEvent(primaryId, occDate, scope) {
  const now = new Date().toISOString();
  const primary = localEvents.find(e => e.id === primaryId);
  if (!primary) return;
  if (scope === "all" || !primary.recurrence) {
    await db(`DELETE FROM events WHERE id=? OR recurring_event_id=?`, [primaryId, primaryId]);
  } else if (scope === "this") {
    const existing = localEvents.find(e => e.recurring_event_id === primaryId && e.original_date === occDate);
    if (existing) {
      await db(`UPDATE events SET is_cancelled=1,updated_at=? WHERE id=?`, [now, existing.id]);
    } else {
      const exId = crypto.randomUUID();
      await db(`INSERT INTO events (id,title,description,location,start_date,start_time,end_date,end_time,all_day,color,organizer_id,attendee_ids,recurring_event_id,original_date,is_cancelled,source,created_by,created_at,updated_at)
        VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,1,'local',?,?,?)`,
        [exId,primary.title,primary.description,primary.location,occDate,primary.start_time,occDate,primary.end_time,primary.all_day,primary.color,ME?.id??null,"[]",primaryId,occDate,ME?.id??null,now,now]);
    }
  } else if (scope === "following") {
    const rule = JSON.parse(primary.recurrence ?? "{}");
    rule.end_date = addDayStr(occDate, -1); rule.end_type = "date";
    await db(`UPDATE events SET recurrence=?,updated_at=? WHERE id=?`, [JSON.stringify(rule), now, primaryId]);
    await db(`DELETE FROM events WHERE recurring_event_id=? AND original_date>=?`, [primaryId, occDate]);
  }
  await loadLocalEvents(); closeModal(); render();
}

// ─── Scope picker ─────────────────────────────────────────────────────────
function openScopeModal(action, primaryId, occDate) {
  const isEdit = action === "edit";
  const scopeOpts = [
    { scope: "this",      icon: "📌", label: "This event",               desc: `Only ${fmtDateShort(occDate)}` },
    { scope: "following", icon: "➡️", label: "This and following events", desc: `From ${fmtDateShort(occDate)} onwards` },
    { scope: "all",       icon: "🔁", label: "All events",               desc: `Every occurrence in the series` },
  ];
  openModal(`
    <div class="modal-header">
      <h3>${isEdit ? "Edit recurring event" : "Delete recurring event"}</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:14px">Which events do you want to ${isEdit ? "edit" : "delete"}?</p>
    ${scopeOpts.map(o => `
      <div class="scope-option" onclick="${isEdit ? `closeModal();openDirectEdit_('${primaryId}','${o.scope}','${occDate}')` : `closeModal();deleteEvent('${primaryId}','${occDate}','${o.scope}')`}">
        <span class="scope-icon">${o.icon}</span>
        <div><div class="scope-label">${o.label}</div><div class="scope-desc">${o.desc}</div></div>
      </div>`).join("")}
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button></div>`);
}
window.openDirectEdit_ = function(primaryId, scope, occDate) {
  const primary = localEvents.find(e => e.id === primaryId);
  if (primary) openDirectEdit(primary, scope, occDate);
};
window.openEditModal   = openEditModal;
window.confirmDelete   = confirmDelete;
window.deleteEvent     = deleteEvent;

// ─── Modal ────────────────────────────────────────────────────────────────
function openModal(html) {
  closeModal();
  modalEl = document.createElement("div");
  modalEl.className = "modal-backdrop";
  modalEl.innerHTML = `<div class="modal">${html}</div>`;
  modalEl.addEventListener("click", e => { if (e.target === modalEl) closeModal(); });
  document.body.appendChild(modalEl);
}
function closeModal() { modalEl?.remove(); modalEl = null; }

// ─── Navigation ───────────────────────────────────────────────────────────
function prevPeriod() {
  if (viewMode === "month")  pivot.setMonth(pivot.getMonth() - 1);
  else if (viewMode === "week")  pivot.setDate(pivot.getDate() - 7);
  else if (viewMode === "day")   pivot.setDate(pivot.getDate() - 1);
  else pivot.setDate(pivot.getDate() - 30);
  render();
}
function nextPeriod() {
  if (viewMode === "month")  pivot.setMonth(pivot.getMonth() + 1);
  else if (viewMode === "week")  pivot.setDate(pivot.getDate() + 7);
  else if (viewMode === "day")   pivot.setDate(pivot.getDate() + 1);
  else pivot.setDate(pivot.getDate() + 30);
  render();
}
function goToday() { pivot = new Date(); render(); }
function setView(v) { viewMode = v; render(); }

window.prevPeriod      = prevPeriod;
window.nextPeriod      = nextPeriod;
window.goToday         = goToday;
window.setView         = setView;
window.openCreateModal = openCreateModal;
window.openDayPanel    = openDayPanel;
window.showEvent       = showEvent;
window.closeModal      = closeModal;
window.closePanels     = closePanels;

// ─── Init ─────────────────────────────────────────────────────────────────
(async () => {
  if (CONTEXT) {
    try {
      const res = await fetch(`${CONTEXT}?keys=family.members`);
      members = ((await res.json())["family.members"]) ?? [];
    } catch { members = []; }
  }
  if (DB) { await initDb(); await loadLocalEvents(); }
  await loadSyncedEvents();
  render();
})();
</script>
</body>
</html>
